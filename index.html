<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouCaps - Personalized Supplements</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; padding: 60px 20px; text-align: center; }
        h1 { font-size: 48px; margin-bottom: 20px; font-weight: bold; }
        p { font-size: 18px; color: #666; margin-bottom: 40px; line-height: 1.6; }
        .cta-button { 
            display: inline-block;
            background: #8b5cf6;
            color: white;
            padding: 16px 40px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.3s;
        }
        .cta-button:hover { background: #7c3aed; }
        .features { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 30px; margin-top: 80px; }
        .feature { padding: 20px; }
        .feature h3 { font-size: 20px; margin-bottom: 10px; }
        .feature p { color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Personalized Supplements, AI-Powered</h1>
        <p>Answer 5 quick questions. Get your perfect supplement formula in minutes.</p>
        
        <a href="quiz.html" class="cta-button">Start Quiz Now →</a>
        
        <div class="features">
            <div class="feature">
                <h3>🧬 Personalized</h3>
                <p>AI analyzes your lifestyle and goals</p>
            </div>
            <div class="feature">
                <h3>⚡ Science-Based</h3>
                <p>Formulas backed by research</p>
            </div>
            <div class="feature">
                <h3>💪 Results-Driven</h3>
                <p>Track improvements over time</p>
            </div>
        </div>
    </div>
</body>
</html>
